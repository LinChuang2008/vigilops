{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nightmend.fullname" . }}-mcp
  labels:
    {{- include "nightmend.mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nightmend.mcp.selectorLabels" . | nindent 4 }}
{{- end }}
